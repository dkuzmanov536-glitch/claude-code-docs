<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Drakon Feast">
<link rel="manifest" href="manifest.json">
<title>Drakon Feast 🐉</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,-apple-system,sans-serif;background:#0a0a0f;color:#f0e6d3;min-height:100vh;user-select:none;overflow-x:hidden}

/* SCREENS */
.screen{display:none;min-height:100vh}
.screen.active{display:flex}

/* ── SETUP ── */
#s-setup{flex-direction:column;align-items:center;justify-content:flex-start;padding:28px 16px 48px;background:radial-gradient(ellipse at 50% 0%,#2a0a3e 0%,#0a0a0f 65%)}
.big-dragon{font-size:64px;animation:float 3s ease-in-out infinite;display:block;text-align:center;margin-bottom:12px}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.gtitle{font-size:clamp(32px,9vw,68px);font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,#f5c542,#ff6b2b,#9b59b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:6px}
.gsub{font-size:13px;color:#a89070;text-align:center;margin-bottom:28px}

.sbox{width:100%;max-width:440px;margin-bottom:22px}
.slabel{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:#a89070;margin-bottom:10px}
.cnt-row{display:flex;gap:8px}
.cnt{flex:1;padding:12px 0;border-radius:10px;border:2px solid #2a2a3e;background:#12121a;color:#f0e6d3;font-size:20px;font-weight:700;cursor:pointer;transition:all .2s}
.cnt.on{border-color:#f5c542;background:rgba(245,197,66,.12);color:#f5c542}

.hero-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.hero-opt{background:#12121a;border:2px solid #2a2a3e;border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer;transition:all .2s}
.hero-opt:hover{border-color:#6c3483}
.hero-opt.on{border-color:var(--hc);background:rgba(0,0,0,.35)}
.ho-em{font-size:28px;display:block}
.ho-nm{font-size:11px;color:#a89070;margin-top:3px}
.ho-pw{font-size:9px;color:#604a80;margin-top:2px;line-height:1.3}
.p-label{font-size:12px;margin-bottom:8px}
.p-row{margin-bottom:16px;width:100%;max-width:440px}

.btn-start{width:100%;max-width:440px;padding:15px;border-radius:13px;background:linear-gradient(135deg,#6c3483,#ff6b2b);color:#fff;font-size:17px;font-weight:700;border:none;cursor:pointer;margin-top:10px;letter-spacing:.5px}
.btn-start:hover{opacity:.9}

/* ── GAME ── */
#s-game{flex-direction:column;background:#0a0a0f}
.game-wrap{display:grid;grid-template-columns:1fr 250px;height:100vh;max-height:100vh}
@media(max-width:680px){.game-wrap{grid-template-columns:1fr;grid-template-rows:auto 1fr;height:auto}}

.board-area{display:flex;align-items:center;justify-content:center;padding:12px;overflow:hidden}
.board{display:grid;grid-template-columns:repeat(10,1fr);grid-template-rows:repeat(6,1fr);gap:3px;width:100%;max-width:520px;aspect-ratio:10/6}

.cell{border-radius:5px;background:#111118;border:1px solid #1e1e2e;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;position:relative;padding:2px 1px;cursor:default;transition:background .2s}
.cell-n{position:absolute;top:1px;left:2px;font-size:clamp(6px,1vw,9px);color:#2a2a4a;line-height:1}
.cell-ic{font-size:clamp(10px,1.8vw,16px);margin-top:auto;line-height:1}
.cell-tok{display:flex;flex-wrap:wrap;gap:1px;justify-content:center;margin-top:auto;padding-bottom:1px}
.tok{border-radius:50%;border:1px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;font-size:clamp(7px,1.2vw,11px);width:clamp(11px,2vw,16px);height:clamp(11px,2vw,16px);background:var(--tc);transition:all .35s}
.cell.sp{border-color:var(--sc)}
.cell.fin{background:linear-gradient(135deg,rgba(245,197,66,.18),rgba(255,107,43,.15));border-color:#f5c542}

/* SIDEBAR */
.sidebar{background:#0e0e18;border-left:1px solid #1e1e2e;display:flex;flex-direction:column;gap:12px;padding:12px;overflow-y:auto}
@media(max-width:680px){.sidebar{border-left:none;border-top:1px solid #1e1e2e;height:auto}}

.cur-box{background:#1a1a2e;border-radius:11px;padding:12px;border:2px solid var(--cc,#6c3483);text-align:center}
.cur-em{font-size:36px}
.cur-name{font-size:14px;font-weight:700;color:var(--cc,#f5c542);margin-top:3px}
.cur-info{font-size:11px;color:#a89070}

.dice-box{text-align:center}
.dice{width:64px;height:64px;background:#fff;border-radius:13px;display:inline-block;line-height:64px;text-align:center;font-size:32px;cursor:pointer;margin:6px auto;box-shadow:0 4px 18px rgba(0,0,0,.5);transition:transform .1s}
.dice:active{transform:scale(.9)}
.dice.spin{animation:dspin .55s ease}
@keyframes dspin{0%{transform:rotate(0) scale(1)}25%{transform:rotate(22deg) scale(1.12)}60%{transform:rotate(-14deg) scale(.93)}100%{transform:rotate(0) scale(1)}}
.btn-roll{width:100%;padding:10px;border-radius:9px;background:linear-gradient(135deg,#6c3483,#9b59b6);color:#fff;font-size:14px;font-weight:700;border:none;cursor:pointer;transition:opacity .2s}
.btn-roll:disabled{opacity:.4;cursor:not-allowed}

.pwr-btn{width:100%;padding:9px;border-radius:9px;background:linear-gradient(135deg,#b8860b,#f5c542);color:#000;font-size:12px;font-weight:700;border:none;cursor:pointer;transition:opacity .2s}
.pwr-btn:disabled{opacity:.35;cursor:not-allowed}
.pwr-info{font-size:10px;color:#a89070;text-align:center;margin-top:4px;line-height:1.4}

.plist{display:flex;flex-direction:column;gap:6px}
.pitem{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:8px;background:#1a1a2e;border:1px solid transparent}
.pitem.cur{border-color:var(--pc)}
.pdot{width:26px;height:26px;border-radius:50%;background:var(--pc);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.pinfo .pname{font-size:12px;font-weight:600}
.pinfo .ppos{font-size:10px;color:#a89070}

.log-box{background:#09090f;border-radius:8px;padding:8px;max-height:100px;overflow-y:auto;font-size:11px;color:#a89070;line-height:1.6}

/* TOAST */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.85);background:rgba(20,18,40,.97);border:2px solid #6c3483;border-radius:14px;padding:18px 24px;text-align:center;z-index:500;opacity:0;transition:all .25s;pointer-events:none;max-width:280px}
.toast.on{opacity:1;transform:translate(-50%,-50%) scale(1)}
.t-ic{font-size:38px;display:block;margin-bottom:6px}
.t-msg{font-size:15px;font-weight:700}
.t-sub{font-size:12px;color:#a89070;margin-top:3px}

/* TARGET OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.overlay.on{display:flex}
.ov-title{font-size:18px;font-weight:700;color:#f5c542}
.tgt{display:flex;align-items:center;gap:12px;padding:12px 22px;border-radius:11px;background:#12121a;border:2px solid #2a2a3e;cursor:pointer;width:220px;transition:border-color .2s}
.tgt:hover{border-color:#e74c3c}
.ov-cancel{padding:8px 22px;border-radius:8px;background:#1a1a2e;border:1px solid #2a2a3e;color:#a89070;cursor:pointer;font-size:13px}

/* WIN */
#s-win{flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;background:radial-gradient(ellipse at 50% 30%,#2a0a3e 0%,#0a0a0f 70%)}
.win-em{font-size:80px;animation:float 2s ease-in-out infinite}
.win-title{font-size:44px;font-weight:900;color:#f5c542;margin:14px 0 6px}
.win-sub{font-size:17px;color:#a89070;margin-bottom:30px}
.btn-again{padding:13px 36px;border-radius:11px;background:linear-gradient(135deg,#6c3483,#ff6b2b);color:#fff;font-size:16px;font-weight:700;border:none;cursor:pointer}
.confetti-wrap{position:fixed;inset:0;pointer-events:none;overflow:hidden}
.conf{position:absolute;border-radius:2px;animation:cfall linear forwards}
@keyframes cfall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(540deg);opacity:0}}
</style>
</head>
<body>

<!-- SETUP -->
<div id="s-setup" class="screen active">
  <span class="big-dragon">🐉</span>
  <div class="gtitle">DRAKON FEAST</div>
  <div class="gsub">A family game with dragons • 2–6 players</div>

  <div class="sbox">
    <div class="slabel">Number of players</div>
    <div class="cnt-row" id="cnt-row">
      <button class="cnt" onclick="setN(2)">2</button>
      <button class="cnt" onclick="setN(3)">3</button>
      <button class="cnt" onclick="setN(4)">4</button>
      <button class="cnt" onclick="setN(5)">5</button>
      <button class="cnt" onclick="setN(6)">6</button>
    </div>
  </div>

  <div id="hero-area"></div>
  <button class="btn-start" id="btn-go" onclick="startGame()" style="display:none">🐉 Start the game!</button>
</div>

<!-- GAME -->
<div id="s-game" class="screen">
  <div class="game-wrap">
    <div class="board-area"><div class="board" id="board"></div></div>
    <div class="sidebar">
      <div class="cur-box" id="cur-box"></div>
      <div class="dice-box">
        <div class="dice" id="dice" onclick="rollDice()">🎲</div>
        <button class="btn-roll" id="btn-roll" onclick="rollDice()">Roll the dice!</button>
      </div>
      <div>
        <button class="pwr-btn" id="pwr-btn" onclick="usePower()">⚡ Special power</button>
        <div class="pwr-info" id="pwr-info"></div>
      </div>
      <div class="plist" id="plist"></div>
      <div>
        <div style="font-size:10px;color:#a89070;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px">Events</div>
        <div class="log-box" id="log-box"></div>
      </div>
    </div>
  </div>
</div>

<!-- WIN -->
<div id="s-win" class="screen">
  <div class="confetti-wrap" id="cw"></div>
  <span class="win-em" id="w-em">🐉</span>
  <div class="win-title" id="w-title">Victory!</div>
  <div class="win-sub" id="w-sub"></div>
  <button class="btn-again" onclick="resetGame()">🔄 Play again</button>
</div>

<!-- LION TARGET -->
<div class="overlay" id="ov">
  <div class="ov-title">🦁 Choose a target (-3 squares)</div>
  <div id="ov-list"></div>
  <button class="ov-cancel" onclick="cancelTarget()">Cancel</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <span class="t-ic" id="t-ic"></span>
  <div class="t-msg" id="t-msg"></div>
  <div class="t-sub" id="t-sub"></div>
</div>

<script>
const COLORS=['#f5c542','#ff6b2b','#9b59b6','#27ae60','#2980b9','#e74c3c'];
const DICE_ICO=['⚀','⚁','⚂','⚃','⚄','⚅'];
const HEROES=[
  {id:'dragon', em:'🐉',name:'Dragon',  power:'All players move 2 squares back'},
  {id:'phoenix',em:'🦅',name:'Phoenix', power:'Next backward move is cancelled'},
  {id:'unicorn',em:'🦄',name:'Unicorn', power:'Roll twice, take the higher result'},
  {id:'lion',   em:'🦁',name:'Lion',    power:'Send a player 3 squares back'},
  {id:'wolf',   em:'🐺',name:'Wolf',    power:'Swap places with the leader'},
  {id:'fox',    em:'🦊',name:'Fox',     power:'Ignore the next bad square'},
];
const SP={
  8: {t:'good',ic:'🐉',col:'#27ae60',d:5},
  23:{t:'good',ic:'🐉',col:'#27ae60',d:5},
  37:{t:'good',ic:'🐉',col:'#27ae60',d:5},
  51:{t:'good',ic:'🐉',col:'#27ae60',d:5},
  15:{t:'bad', ic:'🔥',col:'#e74c3c',d:-4},
  30:{t:'bad', ic:'🔥',col:'#e74c3c',d:-4},
  43:{t:'bad', ic:'🔥',col:'#e74c3c',d:-4},
  56:{t:'bad', ic:'🔥',col:'#e74c3c',d:-5},
  11:{t:'fwd2',ic:'⏩',col:'#00bcd4',d:2},
  26:{t:'fwd2',ic:'⏩',col:'#00bcd4',d:2},
  41:{t:'fwd2',ic:'⏩',col:'#00bcd4',d:2},
  19:{t:'swap',ic:'🔄',col:'#2980b9'},
  36:{t:'swap',ic:'🔄',col:'#2980b9'},
  13:{t:'sleep',ic:'💤',col:'#9b59b6'},
  33:{t:'sleep',ic:'💤',col:'#9b59b6'},
  49:{t:'sleep',ic:'💤',col:'#9b59b6'},
  21:{t:'star',ic:'⭐',col:'#ff6b2b',d:8},
  46:{t:'star',ic:'⭐',col:'#ff6b2b',d:8},
};

let G={players:[],cur:0,busy:false,log:[],heroes:[]};
let pCount=0;

// ──── SETUP ────
function setN(n){
  pCount=n;
  document.querySelectorAll('.cnt').forEach((b,i)=>b.classList.toggle('on',i===n-2));
  G.heroes=new Array(n).fill(0);
  renderHeroSelect(n);
  document.getElementById('btn-go').style.display='block';
}

function renderHeroSelect(n){
  const a=document.getElementById('hero-area'); a.innerHTML='';
  for(let p=0;p<n;p++){
    const row=document.createElement('div'); row.className='p-row';
    row.innerHTML=`<div class="p-label" style="color:${COLORS[p]};font-size:12px;font-weight:700">Player ${p+1} — choose hero</div><div class="hero-grid">${HEROES.map((h,i)=>`<div class="hero-opt ${i===0?'on':''}" style="--hc:${COLORS[p]}" onclick="pickHero(${p},${i})" id="ho-${p}-${i}"><span class="ho-em">${h.em}</span><div class="ho-nm">${h.name}</div><div class="ho-pw">${h.power}</div></div>`).join('')}</div>`;
    a.appendChild(row);
  }
}

function pickHero(p,i){
  G.heroes[p]=i;
  document.querySelectorAll(`#ho-${p}-0,#ho-${p}-1,#ho-${p}-2,#ho-${p}-3,#ho-${p}-4,#ho-${p}-5`)
    .forEach((el,idx)=>el.classList.toggle('on',idx===i));
}

function startGame(){
  G.players=Array.from({length:pCount},(_,i)=>({
    name:`Player ${i+1}`,hero:HEROES[G.heroes[i]],
    color:COLORS[i],pos:0,pUsed:false,skip:false,shield:false,pShield:false
  }));
  G.cur=0; G.busy=false; G.log=[];
  show('s-game');
  buildBoard();
  renderSidebar();
  log('🐉 The game has started!');
}

// ──── BOARD ────
function cellNum(r,c){
  const rfb=5-r,base=rfb*10;
  return rfb%2===0?base+c+1:base+10-c;
}

function buildBoard(){
  const bd=document.getElementById('board'); bd.innerHTML='';
  for(let r=0;r<6;r++) for(let c=0;c<10;c++){
    const n=cellNum(r,c),sp=SP[n],fin=n===60;
    const el=document.createElement('div');
    el.className='cell'+(sp?' sp':'')+(fin?' fin':'');
    if(sp) el.style.setProperty('--sc',sp.col);
    el.id='c'+n;
    el.innerHTML=`<span class="cell-n">${n}</span><span class="cell-ic">${fin?'🏰':sp?sp.ic:''}</span><div class="cell-tok" id="t${n}"></div>`;
    bd.appendChild(el);
  }
  renderTokens();
}

function renderTokens(){
  document.querySelectorAll('.cell-tok').forEach(e=>e.innerHTML='');
  G.players.forEach((p)=>{
    if(p.pos<1) return;
    const c=document.getElementById('t'+p.pos);
    if(!c) return;
    const t=document.createElement('div');
    t.className='tok'; t.style.setProperty('--tc',p.color);
    t.textContent=p.hero.em; c.appendChild(t);
  });
}

// ──── SIDEBAR ────
function renderSidebar(){
  const p=G.players[G.cur];
  const cb=document.getElementById('cur-box');
  cb.style.setProperty('--cc',p.color);
  cb.innerHTML=`<div class="cur-em">${p.hero.em}</div><div class="cur-name">${p.name} · ${p.hero.name}</div><div class="cur-info">${p.skip?'💤 Skipping turn!':'Your turn!'}</div>`;
  const rb=document.getElementById('btn-roll');
  rb.disabled=G.busy;
  rb.textContent=p.skip?'💤 Skipping turn':'🎲 Roll the dice!';
  const pb=document.getElementById('pwr-btn');
  pb.disabled=p.pUsed||G.busy;
  pb.textContent=`${p.hero.em} ${p.hero.name}: Special power`;
  document.getElementById('pwr-info').textContent=p.pUsed?'Already used':p.hero.power;
  const pl=document.getElementById('plist');
  pl.innerHTML=G.players.map((q,i)=>`<div class="pitem ${i===G.cur?'cur':''}" style="--pc:${q.color}"><div class="pdot">${q.hero.em}</div><div class="pinfo"><div class="pname">${q.name}</div><div class="ppos">Square ${q.pos||'Start'}${q.skip?' 💤':''}</div></div></div>`).join('');
}

// ──── DICE ────
async function rollDice(){
  if(G.busy) return;
  const p=G.players[G.cur];
  if(p.skip){ p.skip=false; log(`💤 ${p.name} skips their turn.`); nextTurn(); return; }
  G.busy=true; renderSidebar();
  const n=await animDice();
  log(`🎲 ${p.name} rolled ${n}`);
  await move(G.cur,n);
  G.busy=false;
}

async function animDice(){
  const d=document.getElementById('dice');
  d.classList.add('spin');
  let v=0;
  for(let i=0;i<9;i++){ v=rnd6(); d.textContent=DICE_ICO[v-1]; await sl(70); }
  d.classList.remove('spin');
  setTimeout(()=>d.classList.add('spin'),0);
  setTimeout(()=>d.classList.remove('spin'),550);
  d.textContent=DICE_ICO[v-1];
  await sl(600);
  return v;
}

async function animDice2(){
  const d=document.getElementById('dice');
  let v=0;
  for(let i=0;i<9;i++){ v=rnd6(); d.textContent=DICE_ICO[v-1]; await sl(70); }
  await sl(300);
  return v;
}

function rnd6(){ return Math.ceil(Math.random()*6); }

// ──── MOVE ────
async function move(pi,steps){
  const p=G.players[pi];
  const back=steps<0;
  if(back && p.pShield){
    p.pShield=false;
    toast('🦅','Phoenix protected you!','You don\'t go back!'); await sl(1700);
    log(`🦅 ${p.name}: Phoenix blocked the backward move!`);
    nextTurn(); return;
  }
  const abs=Math.abs(steps);
  for(let i=0;i<abs;i++){
    if(back){ if(p.pos>1) p.pos--; }
    else { if(p.pos<60) p.pos++; }
    renderTokens(); await sl(90);
  }
  if(p.pos>=60){ p.pos=60; renderTokens(); await sl(300); showWin(pi); return; }
  await applyCell(pi);
}

async function applyCell(pi){
  const p=G.players[pi],sp=SP[p.pos];
  if(!sp){ nextTurn(); return; }
  if(p.shield && (sp.t==='bad'||sp.t==='sleep')){
    p.shield=false;
    toast('🦊','Fox protected you!','The bad square was skipped!'); await sl(1700);
    log(`🦊 ${p.name} avoided ${sp.ic}`);
    nextTurn(); return;
  }
  if(sp.t==='good'){
    toast('🐉','Good dragon!',`+${sp.d} squares forward!`); await sl(1700);
    log(`🐉 ${p.name}: good dragon! +${sp.d}`); await move(pi,sp.d); return;
  }
  if(sp.t==='bad'){
    toast('🔥','Bad dragon!',`${sp.d} squares back!`); await sl(1700);
    log(`🔥 ${p.name}: bad dragon! ${sp.d}`); await move(pi,sp.d); return;
  }
  if(sp.t==='fwd2'){
    toast('⏩','2 moves forward!','+2 squares!'); await sl(1700);
    log(`⏩ ${p.name}: +2 squares forward!`); await move(pi,2); return;
  }
  if(sp.t==='swap'){
    const li=leader(pi);
    if(li!==-1){
      const lp=G.players[li],tmp=p.pos; p.pos=lp.pos; lp.pos=tmp;
      toast('🔄','Swap!',`${p.name} ↔ ${lp.name}`); renderTokens(); await sl(1700);
      log(`🔄 ${p.name} ↔ ${lp.name}`);
    }
    nextTurn(); return;
  }
  if(sp.t==='sleep'){
    p.skip=true; toast('💤','Sleep!','Skip your next turn!'); await sl(1700);
    log(`💤 ${p.name} fell asleep!`); nextTurn(); return;
  }
  if(sp.t==='star'){
    toast('⭐','Star portal!',`+${sp.d} forward!`); await sl(1700);
    log(`⭐ ${p.name}: star portal +${sp.d}`); await move(pi,sp.d); return;
  }
  nextTurn();
}

function leader(excl){
  let best=-1,bp=-1;
  G.players.forEach((p,i)=>{ if(i!==excl&&p.pos>bp){best=i;bp=p.pos;} });
  return best;
}

// ──── POWERS ────
async function usePower(){
  const p=G.players[G.cur]; if(p.pUsed||G.busy) return;
  switch(p.hero.id){
    case 'dragon':
      p.pUsed=true;
      G.players.forEach((q,i)=>{ if(i!==G.cur&&q.pos>0) q.pos=Math.max(1,q.pos-2); });
      renderTokens(); toast('🐉','Dragon Fire!','Everyone moved back 2 squares!'); await sl(1700);
      log(`🐉 ${p.name}: Dragon Fire!`); renderSidebar(); break;
    case 'phoenix':
      p.pUsed=true; p.pShield=true;
      toast('🦅','Rebirth!','Next backward move is blocked!'); await sl(1700);
      log(`🦅 ${p.name}: Rebirth active!`); renderSidebar(); break;
    case 'unicorn':{
      p.pUsed=true; G.busy=true; renderSidebar();
      const r1=await animDice(), r2=await animDice2();
      const best=Math.max(r1,r2);
      toast('🦄','Magic!',`Rolled ${r1} and ${r2} → took ${best}!`); await sl(1700);
      log(`🦄 ${p.name}: ${r1} and ${r2} → ${best}`); await move(G.cur,best);
      G.busy=false; return;
    }
    case 'lion':{
      const others=G.players.filter((_,i)=>i!==G.cur&&G.players[i].pos>0);
      if(!others.length){ toast('🦁','No targets!','Others are at start.'); await sl(1500); return; }
      p.pUsed=true; renderSidebar(); showTargets(); return;
    }
    case 'wolf':{
      const li=leader(G.cur);
      if(li===-1||G.players[li].pos<=p.pos){ toast('🐺','You are the leader!','No one is ahead of you.'); await sl(1500); return; }
      p.pUsed=true;
      const lp=G.players[li],tmp=p.pos; p.pos=lp.pos; lp.pos=tmp;
      renderTokens(); toast('🐺','Takeover!',`Swapped with ${lp.name}!`); await sl(1700);
      log(`🐺 ${p.name}: swapped with ${lp.name}!`); renderSidebar(); break;
    }
    case 'fox':
      p.pUsed=true; p.shield=true;
      toast('🦊','Cunning!','Next bad square is ignored!'); await sl(1700);
      log(`🦊 ${p.name}: Cunning active!`); renderSidebar(); break;
  }
}

function showTargets(){
  const ov=document.getElementById('ov'),ol=document.getElementById('ov-list');
  ol.innerHTML='';
  G.players.forEach((q,i)=>{
    if(i===G.cur||q.pos<1) return;
    const d=document.createElement('div'); d.className='tgt';
    d.innerHTML=`<div style="font-size:26px">${q.hero.em}</div><div><div style="font-weight:700;color:${q.color}">${q.name}</div><div style="font-size:11px;color:#a89070">Square ${q.pos}</div></div>`;
    d.onclick=()=>applyLion(i); ol.appendChild(d);
  });
  ov.classList.add('on');
}

async function applyLion(ti){
  document.getElementById('ov').classList.remove('on');
  const p=G.players[G.cur],t=G.players[ti];
  t.pos=Math.max(1,t.pos-3); renderTokens();
  toast('🦁','Roar!',`${t.name} went back 3!`); await sl(1700);
  log(`🦁 ${p.name} sent ${t.name} back 3!`); renderSidebar();
}

function cancelTarget(){
  document.getElementById('ov').classList.remove('on');
  G.players[G.cur].pUsed=false; renderSidebar();
}

// ──── TURNS ────
function nextTurn(){
  G.cur=(G.cur+1)%G.players.length;
  G.busy=false; renderSidebar(); renderLog();
}

function log(m){ G.log.unshift(m); if(G.log.length>25) G.log.pop(); renderLog(); }
function renderLog(){ document.getElementById('log-box').innerHTML=G.log.slice(0,10).map(m=>`<div>${m}</div>`).join(''); }

// ──── WIN ────
function showWin(pi){
  const p=G.players[pi];
  show('s-win');
  document.getElementById('w-em').textContent=p.hero.em;
  document.getElementById('w-title').textContent=`${p.name} wins!`;
  document.getElementById('w-sub').textContent=`${p.hero.name} reached the Dragon's Nest! 🏰`;
  confetti();
}

function confetti(){
  const w=document.getElementById('cw'); w.innerHTML='';
  const cols=['#f5c542','#ff6b2b','#9b59b6','#27ae60','#2980b9','#e74c3c'];
  for(let i=0;i<90;i++){
    const c=document.createElement('div'); c.className='conf';
    const sz=5+Math.random()*7;
    c.style.cssText=`left:${Math.random()*100}%;background:${cols[0|Math.random()*6]};animation-duration:${1.4+Math.random()*2}s;animation-delay:${Math.random()*1.5}s;width:${sz}px;height:${sz}px;border-radius:${Math.random()>.5?'50%':'2px'};`;
    w.appendChild(c);
  }
}

function resetGame(){
  G={players:[],cur:0,busy:false,log:[],heroes:[]};
  pCount=0;
  document.querySelectorAll('.cnt').forEach(b=>b.classList.remove('on'));
  document.getElementById('hero-area').innerHTML='';
  document.getElementById('btn-go').style.display='none';
  document.getElementById('dice').textContent='🎲';
  show('s-setup');
}

// ──── TOAST ────
let tTimer;
function toast(ic,msg,sub){
  document.getElementById('t-ic').textContent=ic;
  document.getElementById('t-msg').textContent=msg;
  document.getElementById('t-sub').textContent=sub;
  const t=document.getElementById('toast'); t.classList.add('on');
  clearTimeout(tTimer); tTimer=setTimeout(()=>t.classList.remove('on'),1600);
}

// ──── UTILS ────
function sl(ms){return new Promise(r=>setTimeout(r,ms));}
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ──── PWA ────
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
